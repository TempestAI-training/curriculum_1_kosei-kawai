services:
  demo-app:
    build: .
    volumes:
      - .:/src
    ports:
      - "8000:8000"
    env_file:
      - .env

  db:
    image: postgresSQL:16-alpine
    ports:
      - "5432:5432"
    environment: 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: my_database
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: